name: Verify and deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install pinned Emscripten
        env:
          EMSDK: ${{ runner.temp }}/emsdk
        run: |
          git clone --depth 1 --branch 6.0.3 https://github.com/emscripten-core/emsdk.git "$EMSDK"
          "$EMSDK/emsdk" install 6.0.3
          "$EMSDK/emsdk" activate 6.0.3
          echo "EMSDK=$EMSDK" >> "$GITHUB_ENV"
          echo "EM_CONFIG=$EMSDK/.emscripten" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Native C++ tests
        run: bun run test:cpp

      - name: Build WebAssembly core
        run: bun run build:wasm

      - name: Core and differential tests
        run: bun test


      - name: Install Chromium
        run: bunx playwright install --with-deps chromium

      - name: Browser E2E
        run: bun run test:e2e

      - name: Production build
        run: bun run build -- --base=/brilliant-sort/

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: brilliant-sort-dist
          path: dist/
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
