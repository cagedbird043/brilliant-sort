min_version: 2.1.10

pre-commit:
  parallel: true
  jobs:
    - name: TypeScript typecheck
      run: bun run typecheck

    - name: Bun unit and parity tests
      run: bun test

    - name: Production fixture drift
      run: bun run level:check

    - name: Strict OpenSpec validation
      run: bun run spec:validate

pre-push:
  jobs:
    - name: Native, WASM, and production build
      run: bun run check

    - name: Native ASan and UBSan
      run: bun run test:cpp:sanitized

    - name: Native ThreadSanitizer
      run: bun run test:cpp:tsan

    - name: Desktop and mobile browser E2E
      run: bunx --bun playwright test

    - name: Production fixture drift
      run: bun run level:check

    - name: Strict OpenSpec validation
      run: bun run spec:validate
